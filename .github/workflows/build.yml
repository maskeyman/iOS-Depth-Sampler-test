name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Xcode Project
        run: |
          xcodebuild clean build \
            -workspace "iOS-Depth-Sampler.xcworkspace" \
            -scheme "iOS-Depth-Sampler" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build_output

      - name: Package into IPA
        run: |
          mkdir -p Payload
          # Automatically find the .app file in the Release folder and move it
          mv build_output/Build/Products/Release-iphoneos/*.app Payload/
          zip -r iOS-Depth-Sampler.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Depth-Sampler-IPA
          path: iOS-Depth-Sampler.ipa
