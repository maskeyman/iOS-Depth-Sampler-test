name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CocoaPods dependencies
        run: pod install --repo-update
        continue-on-error: true  # Pods folder is already committed, so this may be skipped

      - name: Build Archive
        run: |
          xcodebuild archive \
            -workspace iOS-Depth-Sampler.xcworkspace \
            -scheme iOS-Depth-Sampler \
            -configuration Release \
            -archivePath ./build/iOS-Depth-Sampler.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/iOS-Depth-Sampler.xcarchive \
            -exportPath ./build/output \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Depth-Sampler-IPA
          path: ./build/output/*.ipa
